<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅图 Go</title>
    
    <!-- 标签页图标（favicon） -->
    <link rel="icon" type="image/png" href="lvtugo.png">
    <link rel="shortcut icon" type="image/png" href="lvtugo.png">
    
    <!-- 苹果设备图标 -->
    <link rel="apple-touch-icon" href="lvtugo.png">
    
    <!-- 其他样式和脚本 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <!-- 侧边栏切换按钮 -->
    <button class="sidebar-toggle-btn" id="sidebarToggleBtn">☰</button>

    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="header">
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <img src="lvtugo.png" alt="LvTuGo" style="height: 50px; width: auto;">
                    <div>
                        <h1 style="margin: 0;">旅图 Go&nbsp;&nbsp;&nbsp;</h1>
                        <p style="margin: 5px 0 0 0;">全国景区地图系统&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</p>
                    </div>
                </div>
            </div>

            <div class="main-interface" id="mainInterface">
                <div class="user-info">
                    <div>你好, <span id="loggedInUser">旅行者</span></div>
                    <button class="logout-btn" id="logoutBtn" style="display:none">退出登录</button>
                </div>

                <div class="content">
                    <!-- AI 助手界面 - 修复超出背景问题 -->
                    <div class="ai-assistant-box">
                        <div class="ai-header">
                            <span>🤖 DeepSeek 智能导游</span>
                            <span id="aiStatus" class="ai-status">在线</span>
                        </div>
                        <div class="ai-chat-history" id="aiChatHistory">
                            <div class="welcome-msg">您好！我是您的智能导游，可以问我关于景区的历史、攻略或路线建议。</div>
                        </div>
                        <div class="ai-input-area">
                            <input type="text" id="aiInput" placeholder="输入问题..." class="ai-input">
                            <button id="sendAiBtn" class="ai-send-btn">提问</button>
                        </div>
                    </div>

                    <!-- 搜索框 -->
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索景区名称或地址...">
                        <button id="searchBtn">🔍</button>
                        <div class="search-results" id="searchResults"></div>
                    </div>

                    <!-- 筛选器 -->
                    <div class="filters">
                        <div class="filter-title">
                            <span>📍</span> 景区类型筛选
                        </div>
                        <div class="filter-options" id="typeFilters">
                            <button class="filter-btn active" data-type="all">全部显示</button>
                            <button class="filter-btn" data-type="5A">5A级景区</button>
                            <button class="filter-btn" data-type="4A">4A级景区</button>
                            <button class="filter-btn" data-type="">自然风景景区</button>
                            <button class="filter-btn" data-type="古建">人文古迹景区</button>
                            <button class="filter-btn" data-type="">红色旅游景区</button>
                            <button class="filter-btn" data-type="">主题乐园景区</button>
                            <button class="filter-btn" data-type="">网红旅行景区</button>
                        </div>

                        <div class="recommend-filter">
                            <div class="filter-title">
                                <span>⭐</span> 推荐度筛选 (≥ <span id="recommendValue">5</span>)
                            </div>
                            <div class="slider-container">
                                <input type="range" id="recommendSlider" min="1" max="10" value="5" step="1">
                                <div class="slider-value">推荐度 ≥ <span id="sliderValue">5</span></div>
                            </div>
                        </div>
                    </div>

                    <!-- 景区列表 -->
                    <div class="scenic-list">
                        <div class="list-title">
                            <span>景区列表</span>
                            <span id="resultCount">0</span>个
                        </div>
                        <div id="scenicListContainer"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地图容器 -->
        <div class="map-container">
            <div id="map"></div>

            <div class="map-controls">
                <button class="control-btn" id="zoomInBtn" title="放大">+</button>
                <button class="control-btn" id="zoomOutBtn" title="缩小">-</button>
                <button class="control-btn" id="resetViewBtn" title="重置视图">↺</button>
                <button class="control-btn" id="locateChinaBtn" title="定位到中国">🇨🇳</button>
            </div>
        </div>
    </div>

    <!-- 网站底部备案信息 -->
    <div style="width: 100%; background: #f5f5f5; text-align: right; padding: 10px 30px 10px 0; font-size: 12px; color: #666; position: fixed; bottom: 0; left: 0; z-index: 999; box-sizing: border-box;">
        <span style="display: inline-block; white-space: nowrap;">
            © 2026 徐宇栋. 张晨冉. 刘天毅. 王瑾熙.

            &nbsp;<a href=" " target="_blank" style="color: #666; text-decoration: none;">晋ICP备2026002303号</a>&nbsp;
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=14070302000137" rel="noreferrer" target="_blank">
                <img src="beian.png" width="15"></img>
                晋公网安备14070302000137号
            </a>
            地址:山西省高校园区大学街63号　邮编:030600
        </span>
    </div>
    <script src="data.js"></script>
</body>
</html>
